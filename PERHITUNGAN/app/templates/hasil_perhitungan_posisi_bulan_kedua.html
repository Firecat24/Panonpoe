<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Hasil Perhitungan Posisi Bulan</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static',filename='img/qhad.ico')}}">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../static/style/style_hasil_posisi_bulan.css'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js" integrity="sha384-Rx+T1VzGupg4BHQYs2gCW9It+akI2MM/mndMCy36UVfodzcJcF0GGLxZIzObiEfa" crossorigin="anonymous"></script>
</head>
<body style="text-align: center;">
    <h2 style="text-align: center;">Menu Perulangan Posisi Bulan Jean Meeus</h2>
    <hr>
    <h7>perhitungan ini menggunakan patokan hari yang berada di input depan</h7><br>
    <h7 style="font-weight: bold;">Mulai Dari Tanggal {{tanggal}}/{{bulan}}/{{tahun}} Jam {{jam}}</h7>
    <hr>
    <form method="post" action="/posisi_bulan_kedua">
        <div class="input-group" id="input_perulangan">
            <span class="input-group-text" id="inputGroup-default">jumlah Jam =</span>
            <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm" name="pengulangan_posisi_bulan">
            <span class="input-group-text" id="inputGroup-default">{{jumlah_pengulangan_posisi_bulan}} JAM</span>
        </div>
        <div class="tombol_submit">
            <div class="btn-group" role="group" aria-label="Basic example">
                <button type="submit" class="btn btn-danger" name="posisi_bulan_kedua"> ganti jam </button>
            </div>
        </div>
    </form>
    <div class="download_text_bulan">
        <a href="/download_text_posisi_bulan" class="btn btn-primary">Unduh dalam bentuk .TXT</a>
    </div>
    <div class="tombol_submit">
        <div class="btn-group" role="group" aria-label="Basic example">
            <a href="/cek_data" class="btn btn-success">Kembali ke Halaman Utama</a>
        </div>
    </div>
</body>
</html>
